<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-LLM Task Router</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>Multi-LLM Task Router</h1>
    <p class="subtitle">Type a task. It gets routed to the best-fit model automatically.</p>

    <textarea id="prompt" placeholder="e.g. Help me debug this Python function..."></textarea>
    <button id="submit">Route Task</button>

    <section id="result" class="hidden">
      <div class="decision">
        <span id="model-badge" class="badge"></span>
        <span id="reason"></span>
      </div>
      <div class="response">
        <h3>Response</h3>
        <p id="response-text"></p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
